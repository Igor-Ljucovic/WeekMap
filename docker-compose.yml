# This app uses 4 compose files: 1 base + 3 environment-specific overrides (for using different databbases).
# Always combine the base with one environment file:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-CU25-ubuntu-22.04
    stop_grace_period: 30s
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "9900:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: weekmap-backend:local
    build:
      context: ./WeekMap.BackEnd.ASP.NET
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:80
    ports:
      - "5141:80"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/80'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  frontend:
    image: weekmap-frontend:local
    build:
      context: ./WeekMap.FrontEnd.REACT
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlserver_data:
