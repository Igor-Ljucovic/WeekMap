name: Selenium Frontend Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-CU25-ubuntu-22.04
        env:
          SA_PASSWORD: SeleniumTestPass123!
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SeleniumTestPass123!' -Q 'SELECT 1' -C -b"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Start backend in background
        run: |
          dotnet run --project WeekMap.BackEnd.ASP.NET/WeekMap.csproj --urls "http://localhost:5141" &
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=WeekMap_Test;User Id=sa;Password=SeleniumTestPass123!;TrustServerCertificate=True;"
          JwtSettings__SecretKey: ci-test-secret-key-must-be-at-least-32-chars!
          AllowedOrigin: http://localhost:3000

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: WeekMap.FrontEnd.REACT

      - name: Start frontend in background
        run: npm start &
        working-directory: WeekMap.FrontEnd.REACT
        env:
          REACT_APP_API_URL: http://localhost:5141
          BROWSER: none

      - name: Wait for backend
        run: timeout 120 bash -c 'until curl -s -o /dev/null http://localhost:5141; do sleep 2; done'

      - name: Wait for frontend
        run: timeout 120 bash -c 'until curl -s -o /dev/null http://localhost:3000; do sleep 2; done'

      - uses: browser-actions/setup-chrome@v1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install selenium requests urllib3 colorama

      - name: Run Selenium tests
        run: python main.py test
        working-directory: WeekMap.Tests
        env:
          CI: true
          BACKEND_PROTOCOL: http
          BACKEND_PORT: "5141"
